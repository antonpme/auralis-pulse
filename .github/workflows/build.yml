name: Cross-platform build

# First cross-platform CI (v1.5 groundwork). Manual trigger only for now:
# it compiles Pulse on macOS, Linux, and Windows and uploads the bundles as
# workflow artifacts so we can confirm the non-Windows builds actually compile.
# No signing, no release attachment yet - that comes once the matrix is green.
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false # let every OS report, don't cancel siblings on first failure
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ''
          - platform: windows-latest
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      # Tauri 2 on Linux needs webkit2gtk-4.1 (not 4.0) plus the tray/appindicator
      # and AppImage tooling. Pinned to ubuntu-22.04 because AppImage packaging is
      # sensitive to the base image version.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: pulse-${{ matrix.platform }}-${{ matrix.target || 'default' }}
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/*/release/bundle/
          if-no-files-found: warn
