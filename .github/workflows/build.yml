name: Cross-platform build

# First cross-platform CI (v1.5 groundwork). Manual trigger only for now:
# it compiles Pulse on macOS, Linux, and Windows and uploads the bundles as
# workflow artifacts so we can confirm the non-Windows builds actually compile.
# No signing, no release attachment yet - that comes once the matrix is green.
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false # let every OS report, don't cancel siblings on first failure
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ''
          - platform: windows-latest
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      # Tauri 2 on Linux needs webkit2gtk-4.1 (not 4.0) plus the tray/appindicator
      # and AppImage tooling. Pinned to ubuntu-22.04 because AppImage packaging is
      # sensitive to the base image version.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      # This first cross-platform pass only proves the code compiles on each OS.
      # createUpdaterArtifacts requires the private signing key, which we are
      # deliberately NOT putting in CI secrets yet. Flip it off at runtime so the
      # build doesn't demand the key. The committed tauri.conf.json is untouched;
      # this edit lives only on the runner.
      - name: Disable updater signing for CI build
        shell: bash
        run: |
          node -e "const fs=require('fs'); const f='src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(f)); c.bundle.createUpdaterArtifacts=false; fs.writeFileSync(f, JSON.stringify(c,null,2));"

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      # Recursive globs by extension. mac bundles land under a target-triple dir
      # (target/<arch>/release/bundle/dmg/), Windows + Linux under the default
      # target/release/bundle/. The earlier single-level `*` glob missed the mac
      # path, so jobs went green but uploaded nothing.
      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: pulse-${{ matrix.platform }}-${{ matrix.target || 'default' }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.exe
          if-no-files-found: warn
